services:
  db:
    image: postgres:16
    container_name: mlops_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    image: python:3.11-alpine
    container_name: mlops_api
    working_dir: /app
    command: ["sh", "-c", "python -m http.server ${API_PORT:-8000}"]
    volumes:
      - ../:/app:ro
    env_file:
      - ../.env
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: nginx:alpine
    container_name: mlops_frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - api

  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: mlops_jupyter
    environment:
      JUPYTER_TOKEN: ${JUPYTER_TOKEN}
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    volumes:
      - ../notebooks:/home/jovyan/work
    command: start-notebook.sh --NotebookApp.token=${JUPYTER_TOKEN}
