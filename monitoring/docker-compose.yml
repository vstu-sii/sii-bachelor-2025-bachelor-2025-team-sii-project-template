services:
  prometheus:
    image: prom/prometheus
    container_name: mlops_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
  grafana:
    image: grafana/grafana
    container_name: mlops_grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
